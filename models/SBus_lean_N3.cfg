\* SBus_lean_N3.cfg — N=3 sanity check
\*
\* KEY: agent/shard names have NO quotes → TLC model values
\* Model values are required for SYMMETRY to work.
\* "a1" (quoted)  = TLA+ string — SYMMETRY rejects this
\*  a1 (no quotes) = TLC model value — SYMMETRY accepts this

SPECIFICATION Spec

SYMMETRY AgentSymmetry

INVARIANTS
  TypeInvariant
  OwnershipInvariant
  VersionMonotonicity
  IND

CONSTANTS
  Agents      = {a1, a2, a3}
  Shards      = {s1, s2}
  MaxVersion  = 3
  RetryBudget = 2
  NULL        = "NULL"
