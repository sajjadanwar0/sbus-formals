\* SBus_ori_N3.cfg — Sanity configuration for SBus_ori (N=3)
\* Checks TypeInvariant, OwnershipInvariant, VersionMonotonicity,
\* ReadSetSoundness (new), and IND (conjunction).

SPECIFICATION Spec

SYMMETRY AgentSymmetry

INVARIANTS
  TypeInvariant
  OwnershipInvariant
  VersionMonotonicity
  ReadSetSoundness
  CommittedHistoriesAreORILegal
  IND

CONSTANTS
  Agents      = {a1, a2, a3}
  Shards      = {s1, s2}
  MaxVersion  = 3
  RetryBudget = 2
  NULL        = "NULL"
