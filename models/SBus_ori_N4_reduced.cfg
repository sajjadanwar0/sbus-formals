\* SBus_ori_N4_reduced.cfg — N=4 reduced bound for CI-style check
\* Full N=4 MaxVersion=3 takes ~1h18min. This config uses MaxVersion=2
\* for a faster confirmation that ReadSetSoundness holds at N=4.

SPECIFICATION Spec

SYMMETRY AgentSymmetry

INVARIANTS
  TypeInvariant
  OwnershipInvariant
  VersionMonotonicity
  ReadSetSoundness
  CommittedHistoriesAreORILegal
  IND

CONSTANTS
  Agents      = {a1, a2, a3, a4}
  Shards      = {s1, s2}
  MaxVersion  = 2
  RetryBudget = 1
  NULL        = "NULL"
