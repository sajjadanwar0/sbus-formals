SPECIFICATION Spec

CONSTANTS
    Agents    = {a1, a2}
    Shards    = {s1, s2}
    Nodes     = {n1, n2, n3}
    MaxVersion = 3

SYMMETRY Symmetry

INVARIANT
    IND
    TypeInvariant
    VersionMonotonicity
    ORISafety

PROPERTY
    TypeSafe
    VersionsMonotone
    FailoverGapExists

CHECK_DEADLOCK FALSE
